name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'portal/**'
      - 'data/clubs.json'
      - 'data/schemas/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy-Artefakt zusammenstellen
        run: |
          mkdir -p _site/data/schemas
          cp portal/index.html portal/style.css portal/app.js portal/verein.html portal/verein.css portal/verein.js portal/theme.js _site/
          cp data/clubs.json _site/data/clubs.json
          cp data/schemas/*.json _site/data/schemas/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - uses: actions/deploy-pages@v4
        id: deployment
