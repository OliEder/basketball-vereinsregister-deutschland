<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Vereinsregister</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
</head>
<body>

  <div class="court-bg" aria-hidden="true">
    <div class="court-lines"></div>
  </div>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-badge">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 3a9 9 0 0 1 6.364 15.364M12 3A9 9 0 0 0 5.636 18.364M12 3v18M3 12h18"/>
  </svg>
  Deutschland
</div>
      <h1 class="hero-title">Basketball<br><span class="hero-accent">Vereinsregister</span></h1>
      <p class="hero-sub">Finde deinen Verein — nach Name oder in deiner Nähe</p>
      <div id="stats-bar"></div>
    </div>
  </header>

  <main>
    <section class="search-panel">
      <div class="search-tabs">
        <button class="tab active" data-tab="name">Nach Name</button>
        <button class="tab" data-tab="location">In der Nähe</button>
      </div>

      <div class="tab-content active" id="tab-name">
        <div class="search-row">
          <input type="text" id="name-input" placeholder="z.B. Telekom Baskets, Bayern..." autocomplete="off" spellcheck="false">
          <button id="name-btn" class="btn-primary">Suchen</button>
        </div>
      </div>

      <div class="tab-content" id="tab-location">
        <div class="search-row">
          <input type="text" id="near-input" placeholder="Dein Ort, z.B. Regensburg">
          <select id="radius-select">
            <option value="10">10 km</option>
            <option value="25" selected>25 km</option>
            <option value="50">50 km</option>
            <option value="100">100 km</option>
          </select>
          <button id="near-btn" class="btn-primary">Suchen</button>
        </div>
      </div>

      <div class="filter-row">
        <label for="geschlecht-filter">Geschlecht:</label>
        <select id="geschlecht-filter">
          <option value="">Alle</option>
          <option value="männlich">männlich</option>
          <option value="weiblich">weiblich</option>
          <option value="mix">mix</option>
        </select>
        <label for="ak-filter">Altersklasse:</label>
        <select id="ak-filter">
          <option value="">Alle</option>
        </select>
      </div>
    </section>

    <section id="results">
      <p id="status-text"></p>
      <div id="map-container" style="display:none">
        <div id="map"></div>
      </div>
      <div id="results-list"></div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <span>Daten: <a href="https://www.basketball-bund.net" target="_blank" rel="noopener">basketball-bund.net</a></span>
      <div class="footer-actions">
        <a href="https://github.com/OliEder/basketball-vereinsregister-deutschland/discussions" target="_blank" rel="noopener" class="feedback-link">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z"/>
  </svg>
  Feedback geben
</a>
        <div class="support-links">
          <a href="https://buymeacoffee.com/olivermarcus.eder" target="_blank" rel="noopener">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/>
  </svg>
  Buy me a coffee
</a>
          <a href="https://ko-fi.com/OliEder" target="_blank" rel="noopener">Ko-fi</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
